<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>Library</title>
</head>
<body>
  <div>
    <button command="show-modal" commandfor="add-book" id="add-book-button">Add Book</button>
  </div>
  <dialog id="add-book">
    <div>This is for adding a new book!</div>
    <form action="" id="form-book">
      <div class="form-row">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Lord of the Blings" required>
      </div>
      <div class="form-row">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" placeholder="Aut Hor" required>
      </div>
      <div class="form-row">
        <label for="pages">Pages</label>
        <input type="number" id="pages" name="pages" placeholder="123" required>
      </div>
      <div class="form-row">
        <label for="read-status">Read Status</label>
        <input type="text" id="read-status" name="read-status" placeholder="Read/Unread" pattern="Read|Unread" required>
      </div>
      <button type="submit" class="form-submit">Submit</button>
    </form>
    <button commandfor="add-book" command="close">Close</button>
  </dialog>
  <div class="books-container" id="library">
  </div>
  <script src="javascript.js"></script>
</body>
</html>
